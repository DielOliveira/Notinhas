<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo das Notinhas</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f3ec;
      color: #2b2b2b;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .game {
      width: min(960px, 100%);
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.12);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 20px;
      font-size: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .progress-wrap {
      width: 100%;
      margin-bottom: 18px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 16px;
    }

    .progress-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress-bar {
      width: 100%;
      height: 28px;
      background: #e5dfd0;
      border-radius: 999px;
      overflow: hidden;
      border: 2px solid #d8cfba;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #06d6a0;
      transition: width .35s ease;
      border-radius: 999px;
    }

    .score, .target {
      font-size: 20px;
      font-weight: bold;
      background: #f1efe8;
      border-radius: 16px;
      padding: 12px 16px;
    }

    .level-pill {
      font-size: 15px;
      font-weight: bold;
      background: #f1efe8;
      border-radius: 999px;
      padding: 8px 12px;
      white-space: nowrap;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #ffd166;
      color: #222;
    }

    button:hover { filter: brightness(.96); }

    .settings-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      font-size: 22px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 2000;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .settings-modal {
      width: min(420px, 100%);
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,.25);
    }

    .settings-modal h2 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    .note-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0 20px;
    }

    .note-option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f6f3ec;
      border-radius: 12px;
      padding: 10px;
      font-weight: bold;
    }

    .note-option input {
      width: 20px;
      height: 20px;
    }

    .sound-option {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f6f3ec;
      border-radius: 12px;
      padding: 10px;
      margin: 16px 0 20px;
      font-weight: bold;
    }

    .sound-option input {
      width: 20px;
      height: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .secondary-button {
      background: #e5dfd0;
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 20px;
      align-items: center;
    }

    .staff-wrap {
      position: relative;
      height: 470px;
      border-radius: 24px;
      background: #fffaf0;
      border: 3px solid #e8dfc8;
      overflow: hidden;
      touch-action: none;
    }

    .staff-line {
      position: absolute;
      left: 8%;
      right: 8%;
      height: 4px;
      background: #222;
      border-radius: 2px;
    }

    .celebration-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 28px;
      background: #fffaf0;
      display: none;
      z-index: 20;
    }

    .staff-wrap.finished .celebration-image {
      display: block;
    }

    .intro-panel,
    .level-transition-panel {
      position: absolute;
      inset: 0;
      z-index: 18;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: #fffaf0;
    }

    .staff-wrap.intro .intro-panel,
    .staff-wrap.level-transition .level-transition-panel {
      display: flex;
    }

    .staff-wrap.intro .staff-line,
    .staff-wrap.intro .drop-zone,
    .staff-wrap.level-transition .staff-line,
    .staff-wrap.level-transition .drop-zone {
      display: none;
    }

    .intro-image,
    .level-transition-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fffaf0;
    }

    .line-5 { top: 105px; }
    .line-4 { top: 165px; }
    .line-3 { top: 225px; }
    .line-2 { top: 285px; }
    .line-1 { top: 345px; }

    .drop-zone {
      position: absolute;
      left: 16%;
      width: 68%;
      height: 34px;
      transform: translateY(-50%);
      border-radius: 18px;
      border: 2px dashed transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(0,0,0,.25);
      font-weight: bold;
      user-select: none;
    }

    .drop-zone.show {
      border-color: rgba(0,0,0,.18);
      background: rgba(255, 209, 102, .18);
    }

    .drop-zone.correct {
      background: rgba(6, 214, 160, .22);
      border-color: #06d6a0;
    }

    .drop-zone.wrong {
      background: rgba(239, 71, 111, .18);
      border-color: #ef476f;
    }

    .hint-area {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .hint-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      font-size: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffd166;
    }

    .hint-image {
      width: 100%;
      max-height: 75vh;
      object-fit: contain;
      border-radius: 16px;
      background: #fffaf0;
    }

    .side-panels {
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 470px;
    }

    .gif-panel {
      width: 100%;
      flex: 1 1 auto;
      border-radius: 24px;
      background: #e200d6;
      border: 4px solid #111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .side-gif {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    .note-bank {
      height: 260px;
      flex: 0 0 260px;
      border-radius: 24px;
      background: #f1efe8;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }

    #noteLabel {
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .note-bank.finished #note,
    .note-bank.finished strong,
    .note-bank.intro #note,
    .note-bank.intro strong,
    .note-bank.level-transition #note,
    .note-bank.level-transition strong {
      display: none;
    }

    .restart-button,
    .start-button {
      display: none;
      background: #06d6a0;
      font-size: 20px;
      padding: 16px 22px;
    }

    .note-bank.finished .restart-button {
      display: block;
    }

    .note-bank.finished .restart-button::before {
      content: 'Avançar';
    }

    .note-bank.intro .start-button {
      display: block;
    }

    .note-bank.level-transition .start-button {
      display: block;
    }

    .draggable-note {
      width: 50px;
      height: 50px;
      object-fit: contain;
      cursor: grab;
      user-select: none;
      touch-action: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.22));
    }

    .draggable-note.hard-note {
      width: 42px;
      height: 42px;
      background: #111;
      border-radius: 50%;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.22));
    }

    .repeat-note-button {
      display: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      padding: 0;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: #ffd166;
    }

    .note-bank.hard-level .repeat-note-button {
      display: inline-flex;
    }

    .note-bank.intro .repeat-note-button,
    .note-bank.level-transition .repeat-note-button,
    .note-bank.finished .repeat-note-button {
      display: none;
    }

    .draggable-note.dragging {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      cursor: grabbing;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .message {
      min-height: 38px;
      margin-top: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .message.good { color: #087f5b; }
    .message.bad { color: #c9184a; }

    @media (max-width: 760px) {
      .board { grid-template-columns: 1fr; }
      .side-panels {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: auto;
      }
      .note-bank {
        height: 160px;
        flex-basis: auto;
      }
      .gif-panel { aspect-ratio: 1.6 / 1; }
      .staff-wrap { height: 430px; }
    }

    @media (max-width: 460px) {
      .side-panels { grid-template-columns: 1fr; }
      .gif-panel { aspect-ratio: 1.6 / 1; }
    }
  </style>
</head>
<body>
  <main class="game">
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Missão das Notinhas</span>
        <div class="progress-right">
          <span id="levelText" class="level-pill">Nível 1</span>
          <span id="trailText" class="level-pill">Trilhas 0 / 5</span>
          <span id="progressText">0 / 10</span>
          <button id="hintButton" class="hint-button" type="button" aria-label="Dica">💡</button>
          <button id="settingsButton" class="settings-button" type="button" aria-label="Configurações">⚙️</button>
        </div>
      </div>

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <section class="board">
      <div id="staff" class="staff-wrap" aria-label="Pentagrama musical">
        <div id="introPanel" class="intro-panel">
          <img class="intro-image" src="notinhas/intro.png" alt="Mago guiando personagens musicais para o pentagrama" />
        </div>
        <div id="levelTransitionPanel" class="level-transition-panel">
          <img class="level-transition-image" src="notinhas/sujas.png" alt="Notinhas musicais sujas no nível difícil" />
        </div>
        <img id="celebrationImage" class="celebration-image" src="notinhas/parabens1.png" alt="Parabéns" />
        <div class="staff-line line-5"></div>
        <div class="staff-line line-4"></div>
        <div class="staff-line line-3"></div>
        <div class="staff-line line-2"></div>
        <div class="staff-line line-1"></div>
      </div>

      <aside class="side-panels" aria-label="Painéis de apoio">
        <div class="gif-panel">
          <img id="sideGif" class="side-gif" alt="" draggable="false" />
        </div>

        <div id="noteBank" class="note-bank">
          <strong id="noteLabel">Nota: Dó</strong>
          <img id="note" class="draggable-note" src="notinhas/do.png" alt="Notinha musical arrastável" draggable="false" />
          <button id="repeatNoteButton" class="repeat-note-button" type="button" aria-label="Ouvir nota novamente" title="Ouvir nota novamente">🔊</button>
          <button id="startButton" class="start-button" type="button">Começar</button>
          <button id="restartButton" class="restart-button" type="button"></button>
        </div>
      </aside>
    </section>

    <div id="message" class="message"></div>
  </main>

  <div id="hintBackdrop" class="modal-backdrop">
    <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="hintTitle">
      <h2 id="hintTitle">Dica</h2>
      <img class="hint-image" src="notinhas/gabarito.png" alt="Gabarito das notas musicais" />
      <div class="modal-actions">
        <button id="closeHintButton" type="button">Fechar</button>
      </div>
    </div>
  </div>

  <div id="settingsBackdrop" class="modal-backdrop">
    <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <h2 id="settingsTitle">Configurar treino</h2>
      <p>Escolha quais notas vão aparecer no jogo:</p>

      <div id="noteOptions" class="note-options"></div>

      <label class="sound-option">
        <input id="noteAudioToggle" type="checkbox" checked />
        Tocar áudio com o nome das notas
      </label>

      <div class="modal-actions">
        <button id="selectAllNotesButton" class="secondary-button" type="button">Todas</button>
        <button id="closeSettingsButton" class="secondary-button" type="button">Cancelar</button>
        <button id="saveSettingsButton" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    // Ajuste estas posições conforme o nível do seu filho.
    // top indica a posição vertical no pentagrama.
    // 105, 165, 225, 285, 345 são linhas. 135, 195, 255, 315 são espaços.
    const notes = [
      { name: 'Mi', top: 345, type: 'linha' },
      { name: 'Fá', top: 315, type: 'espaço' },
      { name: 'Sol', top: 285, type: 'linha' },
      { name: 'Lá', top: 255, type: 'espaço' },
      { name: 'Si', top: 225, type: 'linha' },
      { name: 'Dó', top: 195, type: 'espaço' },
      { name: 'Ré', top: 165, type: 'linha' },
      { name: 'Mi agudo', top: 135, type: 'espaço' },
      { name: 'Fá agudo', top: 105, type: 'linha' }
    ];

    // Aqui você pode trocar a imagem por nota, se quiser.
    // Exemplo: 'Dó': 'notinhas/do.png'
    const noteImages = {
      'Dó': 'notinhas/do.png',
      'Ré': 'notinhas/re.png',
      'Mi': 'notinhas/mi.png',
      'Fá': 'notinhas/fa.png',
      'Sol': 'notinhas/sol.png',
      'Lá': 'notinhas/la.png',
      'Si': 'notinhas/si.png',
      'Mi agudo': 'notinhas/mi-agudo.png',
      'Fá agudo': 'notinhas/fa-agudo.png'
    };

    const gameAudios = {
      success: 'audios/acertou.mp3',
      celebration: 'audios/comemoracao.mp3',
      wrong: 'audios/ahh-nao.mp3'
    };

    const angryWizardFrames = [
      'notinhas/bruxinho-raiva-pulando-1.png',
      'notinhas/bruxinho-raiva-pulando-2.png',
      'notinhas/bruxinho-raiva-pulando-3.png',
      'notinhas/bruxinho-raiva-pulando-4.png',
      'notinhas/bruxinho-raiva-pulando-5.png',
      'notinhas/bruxinho-raiva-pulando-6.png'
    ];

    const laughingWizardFrames = [
      'notinhas/bruxinho-gargalhando-1.png',
      'notinhas/bruxinho-gargalhando-2.png',
      'notinhas/bruxinho-gargalhando-3.png',
      'notinhas/bruxinho-gargalhando-4.png',
      'notinhas/bruxinho-gargalhando-5.png',
      'notinhas/bruxinho-gargalhando-6.png'
    ];

    const waitingWizardFrames = [
      'notinhas/bruxinho-esperando-1.png',
      'notinhas/bruxinho-esperando-2.png',
      'notinhas/bruxinho-esperando-3.png',
      'notinhas/bruxinho-esperando-4.png',
      'notinhas/bruxinho-esperando-5.png',
      'notinhas/bruxinho-esperando-6.png'
    ];

    const staff = document.getElementById('staff');
    const note = document.getElementById('note');
    const noteBank = document.getElementById('noteBank');
    const noteLabel = document.getElementById('noteLabel');
    const targetName = document.getElementById('targetName');
    const scoreEl = document.getElementById('score') || { textContent: '0' };
    const message = document.getElementById('message');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const levelText = document.getElementById('levelText');
    const trailText = document.getElementById('trailText');
    const nextButton = document.getElementById('nextButton');
    const repeatNoteButton = document.getElementById('repeatNoteButton');
    const startButton = document.getElementById('startButton');
    const restartButton = document.getElementById('restartButton');
    const celebrationImage = document.getElementById('celebrationImage');
    const settingsButton = document.getElementById('settingsButton');
    const settingsBackdrop = document.getElementById('settingsBackdrop');
    const noteOptions = document.getElementById('noteOptions');
    const noteAudioToggle = document.getElementById('noteAudioToggle');
    const selectAllNotesButton = document.getElementById('selectAllNotesButton');
    const closeSettingsButton = document.getElementById('closeSettingsButton');
    const saveSettingsButton = document.getElementById('saveSettingsButton');
    const hintButton = document.getElementById('hintButton');
    const hintBackdrop = document.getElementById('hintBackdrop');
    const closeHintButton = document.getElementById('closeHintButton');
    const sideGif = document.getElementById('sideGif');

    let currentNote = null;
    let activeNotes = [...notes];
    let score = 0;
    let streak = 0;
    let isDragging = false;
    let gameStarted = false;
    let gameFinished = false;
    let zones = [];
    let difficulty = 'easy';
    let sideAnimationTimer = null;
    let currentLevel = 1;
    let completedTrails = 0;
    let pendingLevelTwoStart = false;

    const trailsPerLevel = 5;

    const settingsStorageKey = 'jogoNotinhasNotasSelecionadas';
    const noteAudioStorageKey = 'jogoNotinhasAudioNotas';

    function getSavedNoteNames() {
      try {
        const saved = localStorage.getItem(settingsStorageKey);
        if (!saved) return notes.map(item => item.name);

        const parsed = JSON.parse(saved);
        const validNames = notes.map(item => item.name);
        const selectedNames = parsed.filter(name => validNames.includes(name));

        return selectedNames.length > 0 ? selectedNames : validNames;
      } catch (error) {
        return notes.map(item => item.name);
      }
    }

    function saveNoteNames(noteNames) {
      localStorage.setItem(settingsStorageKey, JSON.stringify(noteNames));
    }

    function getSavedNoteAudioEnabled() {
      const saved = localStorage.getItem(noteAudioStorageKey);
      return saved === null ? true : saved === 'true';
    }

    function saveNoteAudioEnabled(enabled) {
      localStorage.setItem(noteAudioStorageKey, String(enabled));
    }

    function createSettingsOptions() {
      const savedNoteNames = getSavedNoteNames();
      noteAudioToggle.checked = getSavedNoteAudioEnabled();

      notes.forEach((item) => {
        const label = document.createElement('label');
        label.className = 'note-option';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = item.name;
        checkbox.checked = savedNoteNames.includes(item.name);

        const text = document.createElement('span');
        text.textContent = item.name;

        label.appendChild(checkbox);
        label.appendChild(text);
        noteOptions.appendChild(label);
      });
    }

    function openHint() {
      hintBackdrop.classList.add('open');
    }

    function closeHint() {
      hintBackdrop.classList.remove('open');
    }

    function openSettings() {
      settingsBackdrop.classList.add('open');
    }

    function closeSettings() {
      settingsBackdrop.classList.remove('open');
    }

    function saveSettings() {
      const selectedNames = [...noteOptions.querySelectorAll('input:checked')].map(input => input.value);
      const noteAudioEnabled = noteAudioToggle.checked;

      if (selectedNames.length === 0) {
        message.textContent = 'Escolha pelo menos uma nota para treinar.';
        message.className = 'message bad';
        return;
      }

      activeNotes = notes.filter(item => selectedNames.includes(item.name));
      saveNoteNames(selectedNames);
      saveNoteAudioEnabled(noteAudioEnabled);
      closeSettings();
      if (gameStarted) {
        restartGame();
      }
    }

    function selectAllNotes() {
      noteOptions.querySelectorAll('input').forEach(input => {
        input.checked = true;
      });
    }

    function createZones() {
      notes.forEach((item) => {
        const zone = document.createElement('div');
        zone.className = 'drop-zone';
        zone.dataset.name = item.name;
        zone.style.top = `${item.top}px`;
        zone.setAttribute('aria-label', `${item.name} (${item.type})`);
        staff.appendChild(zone);
        zones.push(zone);
      });
    }

    function playAudioFile(audioPath) {
      if (!audioPath) return;

      const audio = new Audio(audioPath);
      audio.play().catch(() => {});
    }

    function playSideAnimation(frames, options = {}) {
      if (frames.length === 0) return;

      if (sideAnimationTimer) clearInterval(sideAnimationTimer);

      const loops = options.loops || Infinity;
      const nextFrames = options.nextFrames || null;
      let frameIndex = 0;
      let completedLoops = 0;
      sideGif.src = frames[frameIndex];
      sideGif.style.display = 'block';

      sideAnimationTimer = setInterval(() => {
        frameIndex = (frameIndex + 1) % frames.length;
        if (frameIndex === 0) {
          completedLoops += 1;

          if (completedLoops >= loops) {
            clearInterval(sideAnimationTimer);
            sideAnimationTimer = null;

            if (nextFrames) {
              playSideAnimation(nextFrames);
            }
            return;
          }
        }

        sideGif.src = frames[frameIndex];
      }, 260);
    }

    function speakNote(noteName) {
      // Fala a nota usando a voz do próprio navegador.
      if (!getSavedNoteAudioEnabled()) return;
      if (!('speechSynthesis' in window)) return;

      window.speechSynthesis.cancel();
      const phrase = new SpeechSynthesisUtterance(`Nota ${noteName}`);
      phrase.lang = 'pt-BR';
      phrase.rate = 0.9;
      window.speechSynthesis.speak(phrase);
    }

    function updateProgress() {
      const percent = (streak / 10) * 100;
      progressFill.style.width = `${percent}%`;
      progressText.textContent = `${streak} / 10`;
    }

    function updateLevelDisplay() {
      levelText.textContent = `Nível ${currentLevel}`;
      trailText.textContent = `Trilhas ${Math.min(completedTrails, trailsPerLevel)} / ${trailsPerLevel}`;
    }

    function applyCurrentLevel() {
      difficulty = currentLevel >= 2 ? 'hard' : 'easy';
      updateLevelDisplay();
    }

    function advanceToLevelTwo() {
      currentLevel = 2;
      completedTrails = 0;
      applyCurrentLevel();
      showLevelTransition();
    }

    function getCelebrationImageNumber() {
      const levelOffset = currentLevel === 1 ? 0 : 5;
      return levelOffset + Math.min(completedTrails, trailsPerLevel);
    }

    function showIntroScreen() {
      gameStarted = false;
      gameFinished = false;
      startButton.textContent = 'Começar';
      staff.classList.add('intro');
      noteBank.classList.add('intro');
      staff.classList.remove('finished', 'level-transition');
      noteBank.classList.remove('finished', 'level-transition');
      message.textContent = '';
      message.className = 'message';
      zones.forEach(zone => zone.className = 'drop-zone');
    }

    function showLevelTransition() {
      gameStarted = false;
      gameFinished = true;
      pendingLevelTwoStart = true;
      startButton.textContent = 'Avançar';
      staff.classList.remove('intro', 'finished');
      noteBank.classList.remove('intro', 'finished');
      staff.classList.add('level-transition');
      noteBank.classList.add('level-transition');
      message.textContent = 'Nível difícil desbloqueado!';
      message.className = 'message good';
      zones.forEach(zone => zone.className = 'drop-zone');
    }

    function startLevelTwo() {
      pendingLevelTwoStart = false;
      startButton.textContent = 'Começar';
      staff.classList.remove('level-transition');
      noteBank.classList.remove('level-transition');
      restartGame();
      message.textContent = 'Nível 2! Agora a notinha fica sem desenho.';
      message.className = 'message good';
    }

    function startGame() {
      if (pendingLevelTwoStart) {
        startLevelTwo();
        return;
      }

      gameStarted = true;
      staff.classList.remove('intro');
      staff.classList.remove('level-transition');
      noteBank.classList.remove('intro');
      noteBank.classList.remove('level-transition');
      restartGame();
    }

    function finishGame() {
      gameFinished = true;
      completedTrails += 1;
      updateLevelDisplay();

      if (currentLevel === 1 && completedTrails >= trailsPerLevel) {
        message.textContent = 'Parabéns! Você completou 5 trilhas. Indo para o nível 2!';
        message.className = 'message good';
        advanceToLevelTwo();
        return;
      }

      playAudioFile(gameAudios.celebration);

      celebrationImage.src = `notinhas/parabens${getCelebrationImageNumber()}.png`;
      staff.classList.add('finished');
      noteBank.classList.add('finished');
      if (nextButton) nextButton.disabled = true;

      message.textContent = currentLevel === 1
        ? `Parabéns! Trilha ${completedTrails} de ${trailsPerLevel} completa!`
        : 'Parabéns! Você completou a barra!';
      message.className = 'message good';
    }

    function restartGame() {
      score = 0;
      streak = 0;
      gameStarted = true;
      gameFinished = false;
      scoreEl.textContent = score;
      applyCurrentLevel();
      updateProgress();
      staff.classList.remove('finished');
      staff.classList.remove('intro', 'level-transition');
      noteBank.classList.remove('finished');
      noteBank.classList.remove('intro', 'level-transition');
      if (nextButton) nextButton.disabled = false;
      zones.forEach(zone => zone.className = 'drop-zone');
      pickNewNote();
    }

    function updateNoteVisual() {
      if (difficulty === 'hard') {
        noteBank.classList.add('hard-level');
        note.classList.add('hard-note');
        note.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 42"><circle cx="21" cy="21" r="21" fill="black"/></svg>';
        return;
      }

      noteBank.classList.remove('hard-level');
      note.classList.remove('hard-note');
      note.src = noteImages[currentNote.name];
    }

    function repeatCurrentNoteAudio() {
      if (!currentNote || difficulty !== 'hard' || !gameStarted || gameFinished) return;
      speakNote(currentNote.name);
    }

    function pickNewNote() {
      if (!gameStarted || gameFinished) return;

      currentNote = activeNotes[Math.floor(Math.random() * activeNotes.length)];
      if (targetName) targetName.textContent = currentNote.name;
      noteLabel.textContent = `Nota: ${currentNote.name}`;
      updateNoteVisual();
      speakNote(currentNote.name);
      message.textContent = '';
      message.className = 'message';
      zones.forEach(zone => zone.className = 'drop-zone');
    }

    function showZones() {
      // Mantido vazio de propósito.
      // Agora não mostra mais as áreas pontilhadas.
    }

    function hideZoneFeedbackSoon() {
      setTimeout(() => {
        zones.forEach(zone => zone.className = 'drop-zone');
      }, 700);
    }

    function getZoneUnderPointer(x, y) {
      return zones.find(zone => {
        const rect = zone.getBoundingClientRect();
        return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
      });
    }

    function startDrag(event) {
      if (!gameStarted || gameFinished) return;

      isDragging = true;
      showZones();
      note.classList.add('dragging');
      moveDrag(event);
    }

    function moveDrag(event) {
      if (!isDragging) return;
      const point = getPoint(event);
      note.style.left = `${point.x}px`;
      note.style.top = `${point.y}px`;
    }

    function endDrag(event) {
      if (!isDragging) return;
      isDragging = false;
      note.classList.remove('dragging');
      note.style.left = '';
      note.style.top = '';

      const point = getPoint(event);
      const zone = getZoneUnderPointer(point.x, point.y);

      if (!zone) {
        message.textContent = 'Tente colocar a notinha dentro de uma linha ou espaço.';
        message.className = 'message bad';
        hideZoneFeedbackSoon();
        return;
      }

      if (zone.dataset.name === currentNote.name) {
        zone.classList.add('correct');
        playSideAnimation(angryWizardFrames, { loops: 2, nextFrames: waitingWizardFrames });
        score += 1;
        streak += 1;
        playAudioFile(gameAudios.success);
        scoreEl.textContent = score;
        updateProgress();

        if (streak >= 10) {
          finishGame();
          return;
        }

        message.textContent = 'Muito bem! Acertou!';
        message.className = 'message good';
        setTimeout(pickNewNote, 900);
      } else {
        zone.classList.add('wrong');
        playSideAnimation(laughingWizardFrames, { loops: 2, nextFrames: waitingWizardFrames });
        playAudioFile(gameAudios.wrong);
        message.textContent = `Ops! Essa posição é ${zone.dataset.name}. Tente novamente.`;
        message.className = 'message bad';
        hideZoneFeedbackSoon();
      }
    }

    function getPoint(event) {
      if (event.touches && event.touches[0]) {
        return { x: event.touches[0].clientX, y: event.touches[0].clientY };
      }
      if (event.changedTouches && event.changedTouches[0]) {
        return { x: event.changedTouches[0].clientX, y: event.changedTouches[0].clientY };
      }
      return { x: event.clientX, y: event.clientY };
    }

    note.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', endDrag);
    document.addEventListener('dragstart', (event) => {
      if (event.target !== note) {
        event.preventDefault();
      }
    });

    note.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', (event) => {
      event.preventDefault();
      moveDrag(event);
    }, { passive: false });
    window.addEventListener('touchend', endDrag);

    if (nextButton) nextButton.addEventListener('click', pickNewNote);
    repeatNoteButton.addEventListener('click', repeatCurrentNoteAudio);
    startButton.addEventListener('click', startGame);
    restartButton.addEventListener('click', restartGame);
    settingsButton.addEventListener('click', openSettings);
    hintButton.addEventListener('click', openHint);
    closeHintButton.addEventListener('click', closeHint);
    hintBackdrop.addEventListener('click', (event) => {
      if (event.target === hintBackdrop) closeHint();
    });
    closeSettingsButton.addEventListener('click', closeSettings);
    saveSettingsButton.addEventListener('click', saveSettings);
    selectAllNotesButton.addEventListener('click', selectAllNotes);
    settingsBackdrop.addEventListener('click', (event) => {
      if (event.target === settingsBackdrop) closeSettings();
    });

    activeNotes = notes.filter(item => getSavedNoteNames().includes(item.name));

    applyCurrentLevel();
    playSideAnimation(waitingWizardFrames);
    createSettingsOptions();
    createZones();
    showIntroScreen();
  </script>
</body>
</html>
